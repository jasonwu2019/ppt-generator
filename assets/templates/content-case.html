<!--
  Template: Content Page - Case Study
  Type: 场景案例 (Scenario / Case Study)
  Design: Glassmorphism cards with pain points, solution flow diagram, business impact metrics
  Placeholders:
    {{CASE_TITLE}}            - Case study title
    {{CASE_SUBTITLE}}         - Subtitle/description
    {{CASE_SOURCES}}          - HTML for 典型需求来源 category cards (3 icons)
    {{CASE_PAIN_POINTS}}      - HTML for 业务痛点 cards (2 items)
    {{CASE_SOLUTION_TITLE}}   - Solution section title
    {{CASE_SOLUTION_FLOW}}    - HTML for the 3-node flow diagram (企微→WB→知识库)
    {{CASE_METRICS}}          - HTML for 业务效果 metric cards (2 items)
    {{CASE_REFERENCES}}       - HTML for reference tags (span elements)
    {{CASE_FOOTER_BUTTON}}    - Footer button text (e.g., "演示视频")
    {{LOGO_URL}}              - Logo image URL
-->
<section class="slide">
  <main class="w-full h-screen max-w-[1920px] aspect-[16/9] flex flex-col p-8 relative overflow-hidden" style="background: linear-gradient(135deg, #f2f3ff 0%, #dae2fd 100%); font-family: 'Inter', sans-serif;">
    <!-- Header -->
    <header class="flex justify-between items-start mb-6">
      <div class="flex items-center gap-3">
        <div class="w-6 h-8 bg-primary parallelogram"></div>
        <h1 class="font-headline italic text-headline-lg text-primary">
          {{CASE_TITLE}}
        </h1>
      </div>
      <img alt="Logo" class="h-10 object-contain" src="{{LOGO_URL}}"/>
    </header>
    <!-- Top Section Grid -->
    <div class="grid grid-cols-12 gap-6 mb-6 h-[22%]">
      <!-- 典型需求来源 -->
      <section class="col-span-4 glass-card rounded-xl p-4 section-accent-left flex flex-col justify-between">
        <div class="flex items-center gap-2 mb-3">
          <span class="material-symbols-outlined text-primary">group</span>
          <h2 class="font-headline text-body-lg text-on-surface">典型需求来源</h2>
        </div>
        <div class="flex gap-3 h-full">
          {{CASE_SOURCES}}
        </div>
      </section>
      <!-- 业务痛点 -->
      <section class="col-span-8 glass-card rounded-xl p-4 section-accent-orange">
        <div class="flex items-center gap-2 mb-3">
          <span class="material-symbols-outlined text-[#ff6b35]">error</span>
          <h2 class="font-headline text-body-lg text-on-surface">业务痛点</h2>
        </div>
        <div class="grid grid-cols-2 gap-4">
          {{CASE_PAIN_POINTS}}
        </div>
      </section>
    </div>
    <!-- Main Flow Section -->
    <div class="grid grid-cols-12 gap-6 flex-grow mb-6 overflow-hidden">
      <!-- WorkBuddy 核心解法 -->
      <section class="col-span-8 glass-card rounded-xl p-6 section-accent-left relative">
        <div class="flex items-center gap-2 mb-8">
          <span class="material-symbols-outlined text-primary">desktop_windows</span>
          <h2 class="font-headline text-body-lg text-on-surface">{{CASE_SOLUTION_TITLE}}</h2>
        </div>
        <div class="flex items-center justify-center gap-12 mt-8">
          {{CASE_SOLUTION_FLOW}}
        </div>
      </section>
      <!-- 业务效果 -->
      <section class="col-span-4 glass-card rounded-xl p-6 section-accent-green flex flex-col">
        <div class="flex items-center gap-2 mb-8">
          <span class="material-symbols-outlined text-[#34a853]">trending_up</span>
          <h2 class="font-headline text-body-lg text-on-surface">业务效果</h2>
        </div>
        <div class="flex flex-col gap-6 justify-center flex-grow">
          {{CASE_METRICS}}
        </div>
      </section>
    </div>
    <!-- Footer Bar -->
    <footer class="glass-card rounded-xl px-6 py-4 flex justify-between items-center mt-auto">
      <div class="flex items-center gap-6">
        <div class="flex items-center gap-2 pr-6 border-r border-outline-variant">
          <span class="material-symbols-outlined text-primary fill-icon">verified_user</span>
          <span class="font-bold text-on-surface-variant">案例参考</span>
        </div>
        <div class="flex gap-4">
          {{CASE_REFERENCES}}
        </div>
      </div>
      <button class="flex items-center gap-2 px-6 py-2 bg-white rounded-full border border-primary/20 shadow-sm hover:bg-primary-container hover:text-white transition-all duration-300 group">
        <span class="material-symbols-outlined text-orange-500 fill-icon group-hover:text-white">play_circle</span>
        <span class="font-bold text-on-surface-variant group-hover:text-white">{{CASE_FOOTER_BUTTON}}</span>
      </button>
    </footer>
  </main>
</section>
