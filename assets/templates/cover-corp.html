<!--
  COVER SLIDE — Tencent Cloud Corporate Template (light/浅色)
  ============================================================
  Design extracted from 腾讯云介绍_浅色.pptx company template.
  
  Layout structure:
  ┌──────────────────────────────────────────────────────────┐
  │ [blue bar] ┌─ Logo (top-right)                           │
  │ 17px       │                                              │
  │ #006DFF    │     [Title — large, first letter accent]    │
  │ full-h     │     [Subtitle — smaller, below title]        │
  │            │                                              │
  │            │                [Tagline / Footer]            │
  └──────────────────────────────────────────────────────────┘

  Placeholders:
  {{CORP_TITLE}}         — Main title (e.g., "Tencent ecosystem")
  {{CORP_TITLE_ACCENT}}  — Accent color for first letter (default: #1365E2)
  {{CORP_SUBTITLE}}      — Subtitle below title (e.g., "Business partners")
  {{CORP_LOGO_URL}}      — Logo image URL (top-left area)
  {{CORP_LOGO_ALT}}      — Logo alt text (default: "腾讯云")
  {{CORP_FOOTER}}        — Bottom-right footer text (e.g., presenter, date)
  {{CORP_BG_COLOR}}      — Background color (default: #FFFFFF)
  
  Design Rules (from company template):
  - 16:9 slide (1440x811px reference, but vh/vw responsive)
  - Left accent bar: 17px (#006DFF), full height
  - Title: large (5-6vw), TTTGB Medium or Noto Sans SC, first letter accent
  - Subtitle: ~2.5vw, lighter weight, below title
  - Logo: top-left, ~100-120px height
  - Background: solid white, clean and minimal
  - No glassmorphism, no diagonal overlay, no background images
-->

<section class="slide" data-theme="corp">
  <div class="w-full h-screen flex bg-white overflow-hidden relative" style="background: {{CORP_BG_COLOR}};">
    
    <!-- Left accent bar — #006DFF, 17px wide, full height -->
    <div class="flex-shrink-0 h-full" style="width: 17px; background: {{CORP_ACCENT_COLOR}};"></div>
    
    <!-- Main content area -->
    <div class="flex-1 flex flex-col justify-center relative px-[8%] py-[6%] overflow-hidden">
      
      <!-- Top row: Logo (left) + optional tag (right) -->
      <div class="absolute top-[4%] left-[8%] right-[8%] flex items-center justify-between">
        <div class="flex items-center gap-3">
          {{CORP_LOGO_URL}}
        </div>
      </div>
      
      <!-- Center: Title + Subtitle -->
      <div class="flex-1 flex flex-col justify-center">
        <h1 class="font-bold leading-tight tracking-tight"
            style="font-size: clamp(40px, 6vw, 80px); font-family: 'Noto Sans SC', 'TTTGB Medium', system-ui, sans-serif; color: #1a1a2e;">
          <span style="color: {{CORP_TITLE_ACCENT}}; font-size: 1.4em; display: inline-block; line-height: 0.8; vertical-align: middle;">
            {{CORP_TITLE_ACCENT_CHAR}}
          </span>{{CORP_TITLE_REST}}
        </h1>
        <p class="mt-[2%] tracking-wide"
           style="font-size: clamp(18px, 2.5vw, 36px); color: #555; font-weight: 400; font-family: 'Noto Sans SC', 'Microsoft YaHei', system-ui, sans-serif; line-height: 1.4;">
          {{CORP_SUBTITLE}}
        </p>
      </div>
      
      <!-- Bottom: footer tagline -->
      <div class="absolute bottom-[6%] left-[8%] right-[8%] flex justify-between items-end">
        <span class="text-sm tracking-widest uppercase opacity-40"
              style="font-family: 'Inter', system-ui; font-size: clamp(12px, 1.2vw, 16px); color: #999">
          {{CORP_TAGLINE}}
        </span>
        <span class="text-sm opacity-50"
              style="font-family: 'Inter', 'Noto Sans SC', system-ui; font-size: clamp(11px, 1vw, 14px); color: #666">
          {{CORP_FOOTER}}
        </span>
      </div>
      
    </div>
  </div>
</section>
