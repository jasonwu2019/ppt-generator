<!--
  ENDING SLIDE — Tencent Cloud Corporate Template (light/浅色)
  ==============================================================
  Design extracted from 腾讯云介绍_浅色.pptx company template.

  Layout structure:
  ┌──────────────────────────────────────────────────────────┐
  │ [blue bar]                                                │
  │ 17px                                                      │
  │ #006DFF    ┌ Logo (top-left)                              │
  │            │                                              │
  │            │     [Thank You / 感谢倾听]                   │
  │            │     [Subtitle / Q&A text]                    │
  │            │                                              │
  │            │               [Contact / Footer info]        │
  └──────────────────────────────────────────────────────────┘

  Placeholders:
  {{CORP_ENDING_TITLE}}  — Main text (e.g., "感谢倾听", "Thank You")
  {{CORP_ENDING_SUB}}    — Subtitle (e.g., "Q & A", "Questions & Answers")
  {{CORP_LOGO_URL}}      — Logo image URL
  {{CORP_FOOTER}}        — Footer contact/date info
  {{CORP_ACCENT_COLOR}}  — Left bar color (default: #006DFF)
  {{CORP_BG_COLOR}}      — Background color (default: #FFFFFF)
-->

<section class="slide" data-theme="corp">
  <div class="w-full h-screen flex bg-white overflow-hidden relative" style="background: {{CORP_BG_COLOR}};">
    
    <!-- Left accent bar -->
    <div class="flex-shrink-0 h-full" style="width: 17px; background: {{CORP_ACCENT_COLOR}};"></div>
    
    <!-- Main content area -->
    <div class="flex-1 flex flex-col items-center justify-center relative overflow-hidden">
      
      <!-- Top-left logo -->
      <div class="absolute top-[5%] left-[5%]">
        {{CORP_LOGO_URL}}
      </div>
      
      <!-- Center: Thank You text -->
      <div class="text-center">
        <h1 class="font-bold leading-none tracking-tight"
            style="font-size: clamp(48px, 8vw, 100px); font-family: 'Noto Sans SC', 'TTTGB Medium', system-ui; color: #1a1a2e;">
          <span style="color: {{CORP_ACCENT_COLOR}};">
            {{CORP_ENDING_TITLE_ACCENT}}
          </span>{{CORP_ENDING_TITLE_REST}}
        </h1>
        <p class="mt-[3%] tracking-wide"
           style="font-size: clamp(16px, 2vw, 28px); color: #888; font-family: 'Noto Sans SC', 'Microsoft YaHei', system-ui;">
          {{CORP_ENDING_SUB}}
        </p>
      </div>
      
      <!-- Bottom: Footer -->
      <div class="absolute bottom-[6%] text-center w-full">
        <span class="text-sm opacity-40 tracking-wide"
              style="font-family: 'Inter', 'Noto Sans SC', system-ui; font-size: clamp(11px, 1vw, 14px); color: #999">
          {{CORP_FOOTER}}
        </span>
      </div>
      
    </div>
  </div>
</section>
